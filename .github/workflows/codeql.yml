name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly full scan (Mondays 03:00 UTC) to catch newly-published query rules.
    - cron: '0 3 * * 1'

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (JavaScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # upload findings to the Security tab / PR
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality = security rules + maintainability checks.
          queries: security-and-quality
          config: |
            paths-ignore:
              - node_modules
              - .worktrees
              - coverage
              - tests
              - '**/*.test.js'

      # JavaScript needs no compilation; autobuild is a no-op but kept for
      # forward-compat if a build step is ever added.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
